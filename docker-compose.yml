services:
  articlewriterpro:
    image: mpratamamail/article-writer-pro:latest
    # To build locally instead of pulling, comment out `image:` above and use:
    # build: .
    ports:
      - "3001:3001"
    volumes:
      # Persist database + app-secret across redeploys.
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
